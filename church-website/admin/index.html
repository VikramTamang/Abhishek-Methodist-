<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Abhisek Methodist Church</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@700;800&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="login-body">

  <div class="login-bg">
    <div class="login-bg-overlay"></div>
    <div class="login-particles" id="particles"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="../images/AMCLOGO.jpg" alt="AMC Logo"/>
      </div>
      <div class="login-header">
        <h1>Admin Portal</h1>
        <p>Abhisek Methodist Church</p>
      </div>

      <div id="loginError" class="login-error hidden">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMsg">Access denied.</span>
      </div>

      <form id="loginForm" class="login-form" autocomplete="off">
        <div class="form-field">
          <label for="email"><i class="fas fa-envelope"></i> Admin Email</label>
          <input type="email" id="email" name="email" placeholder="Enter admin email" required autocomplete="off"/>
        </div>
        <div class="form-field">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="off"/>
            <button type="button" class="toggle-pw" id="togglePw"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginText"><i class="fas fa-sign-in-alt"></i> Sign In</span>
          <span id="loginSpinner" class="hidden"><i class="fas fa-circle-notch fa-spin"></i> Verifying…</span>
        </button>
      </form>

      <div class="login-footer">
        <i class="fas fa-shield-alt"></i> Authorised personnel only
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
